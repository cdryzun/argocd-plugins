name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/basecharter

jobs:
  # ------------------------------------------------------------------
  # verify: go vet + build + yaml lint + functional test (GitHub-hosted)
  # ------------------------------------------------------------------
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install helm
        run: |
          curl -fsSL -o /tmp/helm.tar.gz \
            https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz
          sudo tar -xz -C /usr/local/bin --strip-components=1 \
            linux-amd64/helm < /tmp/helm.tar.gz

      - name: Install kustomize
        run: |
          curl -fsSL -o /tmp/kz.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz"
          sudo tar -xz -C /usr/local/bin kustomize < /tmp/kz.tar.gz

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run verify (skip docker)
        run: SKIP_DOCKER=1 bash scripts/verify.sh

  # ------------------------------------------------------------------
  # test-self-hosted: full verification on self-hosted runner
  # Includes docker build test (local runner has docker)
  # ------------------------------------------------------------------
  test-self-hosted:
    name: Test (Self-Hosted)
    runs-on: [self-hosted, Linux, X64]
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Check environment
        run: |
          echo "Runner: $(hostname)"
          echo "OS: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "Go: $(go version)"
          echo "Helm: $(helm version --short 2>/dev/null || echo 'not found')"
          echo "Kustomize: $(kustomize version 2>/dev/null || echo 'not found')"
          echo "Docker: $(docker --version 2>/dev/null || echo 'not found')"
          echo "Python: $(python3 --version)"

      - name: Install missing tools
        run: |
          # Install helm if missing
          if ! command -v helm &>/dev/null; then
            curl -fsSL -o /tmp/helm.tar.gz \
              https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz
            sudo tar -xz -C /usr/local/bin --strip-components=1 \
              linux-amd64/helm < /tmp/helm.tar.gz
          fi

          # Install kustomize if missing
          if ! command -v kustomize &>/dev/null; then
            curl -fsSL -o /tmp/kz.tar.gz \
              "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz"
            sudo tar -xz -C /usr/local/bin kustomize < /tmp/kz.tar.gz
          fi

          # Install pyyaml if missing
          if ! python3 -c "import yaml" 2>/dev/null; then
            pip install pyyaml --user || pip3 install pyyaml --user
          fi

      - name: Run full verification (including docker build)
        run: bash scripts/verify.sh

  # ------------------------------------------------------------------
  # docker: build + push to ghcr.io (push to main only)
  # ------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test-self-hosted
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # argocd-integration: full ArgoCD CMP integration test
  # Runs on self-hosted runner with k3s + ArgoCD
  # ------------------------------------------------------------------
  argocd-integration:
    name: ArgoCD Integration Test
    runs-on: [self-hosted, Linux, X64]
    needs: docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Check Kubernetes and ArgoCD
        run: |
          echo "=== Kubernetes Status ==="
          kubectl get nodes --no-headers
          echo ""
          echo "=== ArgoCD Status ==="
          kubectl get pods -n argocd --no-headers 2>/dev/null || echo "ArgoCD not installed"
          echo ""
          echo "=== ArgoCD Version ==="
          kubectl get deployment argocd-repo-server -n argocd -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "N/A"

      - name: Run ArgoCD Integration Test
        run: |
          # Set environment for the test script
          export KUBECONFIG="${KUBECONFIG:-/etc/rancher/k3s/k3s.yaml}"

          # Run the integration test
          bash test/argocd-integration/run.sh
        env:
          # Pass GitHub token for private repos if needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
