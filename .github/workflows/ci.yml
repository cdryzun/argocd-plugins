name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/basecharter

jobs:
  # ------------------------------------------------------------------
  # verify: go vet + build + yaml lint + functional test
  # ------------------------------------------------------------------
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install helm
        run: |
          curl -fsSL -o /tmp/helm.tar.gz \
            https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz
          sudo tar -xz -C /usr/local/bin --strip-components=1 \
            linux-amd64/helm < /tmp/helm.tar.gz

      - name: Install kustomize
        run: |
          curl -fsSL -o /tmp/kz.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz"
          sudo tar -xz -C /usr/local/bin kustomize < /tmp/kz.tar.gz

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run verify
        run: SKIP_DOCKER=1 bash scripts/verify.sh

  # ------------------------------------------------------------------
  # docker: build + push to ghcr.io (push to main only)
  # ------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
