
include:
  - project: 'devops/gitlabci-templates'
    ref: master
    file: 'jobs-templates/include-all.stable.gitlab-ci.yml'

default:
  image: harbor.treesir.pub:2443/library/base-image:golang-1.20.2

stages:
 - build

variables:
  GO_MOD_PROJECT: $(git remote -v|awk 'NR==1{print $2}'|awk -F '//' '{print $2}'|sed "s#\.git##g"|awk -F '@' '{print $2}')

before_script:
  - echo $GO_MOD_PROJECT
  # - mkdir -p /go/src/$(git remote -v|awk 'NR==1{print $2}'|awk -F '//' '{print $2}'|sed "s#\.git##g"|awk -F '@' '{print $2}')
  # - cp -r $CI_PROJECT_DIR /go/src/$(git remote -v|awk 'NR==1{print $2}'|awk -F '//' '{print $2}'|sed "s#\.git##g")

build:
  stage: build
  timeout: 2 hours
  tags:
    - manage
  script:
    - |
      sleep 18000
      apt update && apt install -y git
      eval $GO_MOD_PROJECT

      echo $(git remote -v|awk 'NR==1{print $2}'|awk -F '//' '{print $2}'|sed "s#\.git##g"|awk -F '@' '{print $2}')


workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH