
default:
  timeout: 2 hours

variables:
  ARCH: amd64
  OS_TYPE: linux
  GO111MODULE: "on"
  GOPROXY: "https://goproxy.cn,direct"

stages:
  - verify
  - build
  - test
  - upload
  - docker

# ------------------------------------------------------------------
# verify: go vet + yaml lint + functional test (no docker)
# ------------------------------------------------------------------
verify:
  stage: verify
  image: golang:1.26-alpine
  tags:
    - manage
  rules:
    - when: always
  before_script:
    - |
      if command -v apk > /dev/null 2>&1; then
        apk add --no-cache curl tar bash python3 py3-yaml ca-certificates
        curl -fsSL -o /tmp/helm.tar.gz \
          https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz
        tar -xz -C /usr/local/bin --strip-components=1 linux-amd64/helm < /tmp/helm.tar.gz
        curl -fsSL -o /tmp/kz.tar.gz \
          "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz"
        tar -xz -C /usr/local/bin kustomize < /tmp/kz.tar.gz
      fi
  script:
    - SKIP_DOCKER=1 bash scripts/verify.sh

# ------------------------------------------------------------------
# build: compile binary for linux/amd64
# ------------------------------------------------------------------
build:
  stage: build
  image: golang:1.26-alpine
  tags:
    - manage
  retry:
    max: 2
  rules:
    - when: always
  cache:
    key: plugin
    paths:
      - bin/
    policy: push
  script:
    - scripts/build.sh ${ARCH} ${OS_TYPE} ${CI_PROJECT_DIR}/bin

# ------------------------------------------------------------------
# test: run integration test against the compiled binary
# ------------------------------------------------------------------
.test_build: &test_build
  stage: test
  tags:
    - manage
  retry:
    max: 2
  rules:
    - when: always
  cache:
    key: plugin
    paths:
      - bin/
    policy: pull

baseCharter test:
  <<: *test_build
  script:
    - set -- $CI_JOB_NAME
    - cd test/$1
    - bash run.sh $1 ${ARCH} ${OS_TYPE}

# ------------------------------------------------------------------
# upload: publish binary artifact (manual trigger)
# ------------------------------------------------------------------
upload:
  stage: upload
  tags:
    - manage
  when: manual
  cache:
    key: plugin
    paths:
      - bin/
    policy: pull
  artifacts:
    paths:
      - bin/
    expire_in: 1 week
  script:
    - |
      for plugin in $(ls ./bin/*); do
        echo "Artifact: $plugin"
        # Configure REPO_URL and AUTH variables in GitLab CI/CD settings
        # curl -u "${AUTH}" "${REPO_URL}" --upload-file "$plugin"
      done

# ------------------------------------------------------------------
# docker: build + push to ghcr.io or custom registry
# ------------------------------------------------------------------
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    # Set REGISTRY and IMAGE_NAME in GitLab CI/CD variables
    # REGISTRY: "ghcr.io"
    # IMAGE_NAME: "ghcr.io/YOUR_GITHUB_ORG/basecharter"
  tags:
    - manage
  rules:
    - when: always
  script:
    - docker build -t "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" .
    - docker tag "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" "${IMAGE_NAME}:latest"
    - docker push "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${IMAGE_NAME}:latest"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
