{{- if .Values.rbac.akka_create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "app-base.fullname" . }}-akka
  labels:
{{ template "app-base.labels" merge (dict "extraLabels" .Values.podLabels) .  }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs:
    - get
    - list
    - watch
{{- end }}

---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "app-base.fullname" . }}
  labels:
{{ template "app-base.labels" merge (dict "extraLabels" .Values.podLabels) .  }}
subjects:
  - kind: ServiceAccount
    name: {{ include "app-base.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "app-base.fullname" . }}-akka
{{- end }}