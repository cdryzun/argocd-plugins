nameOverride: ""

# -----------------  Basic configuration  -----------------------------------------
# Application name (used as the resource name prefix).
appName: ""

# Application group or project name (used for grouping labels).
appGroups: ""


# Port that the application container listens on.
containerPort: 80

# Environment variables injected into the container.
# IMPORTANT: all string values must be quoted to avoid deployment failures.
envVars:
  - name: "TZ"
    value: "UTC"
  # - name: "SPRING_OUTPUT_ANSI_ENABLED"
  #   value: "NEVER"
  # - name: "SPRING_MAIN_BANNER_MODE"
  #   value: "off"
  # - name: "LOGGING_PATTERN_CONSOLE"
  #   value: "[%d] [%5level] [%thread] [%-40logger{39}]:  %msg%n"

# Inject environment variables from a Kubernetes Secret.
# secretVarsSecretName: the Secret name to read keys from (default: "app-secrets").
# secretVars maps env var name → key inside that Secret.
secretVarsSecretName: "app-secrets"
secretVars: {}
  # DB_PASSWORD: "db-password-key"
  # API_KEY: "third-party-api-key"

# Number of pod replicas. Increase for multi-instance (stateless) deployments.
replicaCount: 1

# Container image configuration.
# Note: use the application image here, not the Dockerfile base image.
image:
  repository: nginx
  # Pull policy: Always | Never | IfNotPresent
  # IfNotPresent skips pulling if the image already exists on the node.
  pullPolicy: IfNotPresent
  # Image tag. In production always pin to a specific version (e.g. "1.2.3")
  # so Kubernetes can detect updates reliably.
  tag: "latest"

# Ingress (load balancer routing) configuration.
# Set enabled: true and configure host/paths to expose the application externally.
# Example: to serve myapp.example.com/api set host=myapp.example.com, paths=[/api].
# If you have a gateway that handles routing centrally, leave ingress disabled.
ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: app-base.example.com
      paths:
        - /app-base

# Resource limits and requests.
# limits:   the maximum resources the container may consume.
# requests: the minimum resources required to schedule the container.
# Recommended: keep requests lean (just enough for the app to start).
# A single app should rarely need more than 4 GiB RAM or 1 full CPU core.
resources:
  limits:
    cpu: 500m
    memory: 1024Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Node selector: schedule pods only onto nodes that match these labels.
nodeSelector: {}
  # env: dev

# Annotations added to every pod (e.g. injected by CI with commit metadata).
podAnnotations: {}
  # commitUser: ""
  # commitTime: ""
  # commitHash: ""

# Extra labels added to every pod.
podLabels: {}

# Extra annotations added to the Service.
serviceAnnotations: {}

# Extra labels added to the Service.
serviceLabels: {}

# Extra labels added to the ServiceAccount.
serviceAccountLabels: {}

# Extra labels added to the PersistentVolumeClaim.
persistentVolumeLabels: {}

# Additional labels for log collection routing.
# Requires the application to write logs to stdout/stderr only — never to local files.
logExtraLable: {}
  # logtype label is used by the log collector to route logs by language/format.
  # Supported values: java, python, nginx
  # logtype: "java"
  # logtype: "python"
  # logtype: "nginx"

# Config file mounts. Files placed in the config/ directory of your application repo
# are automatically converted to ConfigMaps and mounted into the container.
configMount:
  # Place config files in the config/ directory of your app repo.
  # Each file becomes a ConfigMap. Only list the files you actually need.
  # Example: mount two files into /etc/nginx/conf.d/
  configList: {}
    # nginx.conf: "/etc/nginx/conf.d/nginx.conf"
    # extra.conf: "/etc/nginx/conf.d/extra.conf"


# Persistent volume configuration.
# WARNING: do NOT use persistence for storing container logs.
# Logs must always go to stdout/stderr.
persistence:
  # Enable persistent storage for the application data directory.
  enabled: false
  ## Retain the PVC after the release is deleted. Remove this annotation to delete with the release.
  annotations:
    "helm.sh/resource-policy": keep
  # Storage class name. Use "-" to let the cluster select the default storage class.
  # Run `kubectl get storageclass` to list available classes.
  storageClassName: "-"
  # Access mode: ReadWriteOnce | ReadOnlyMany | ReadWriteMany
  accessMode: ReadWriteMany
  # Size of the persistent volume.
  size: 10Gi
  # Mount path inside the container. Data written here is persisted to the cluster storage.
  mountPath: "/opt/deployments/data"

# Mount existing PVCs into the container. Required fields: pvcName, mountPath, readOnly.
mountExtraPersistenceVolume: {}
  # price-service:
  #   pvcName: "turing-service"
  #   mountPath: "/home/app/turing-service"
  #   readOnly: true
  # common:
  #   pvcName: "shared-common"
  #   mountPath: "/home/shared/common"
  #   readOnly: true


# Health probe configuration.
# Kubernetes provides three probe types; this chart exposes TCP (default) and HTTP.
# TCP probe: checks that the container port accepts connections (default, always enabled).
# HTTP probe: replaces TCP with an HTTP GET check when containerProbe.enabled=true.
#
# Probe types:
#   readinessProbe: signals when the container is ready to receive traffic.
#   livenessProbe:  signals when the container should be restarted.
containerProbe:
  enabled: false
  # HTTP probe — Kubernetes calls the given path; any 2xx/3xx response means healthy.
  httpMethod:
    # Readiness probe
    readinessProbe:
      httpGet:
        # Health check endpoint implemented by your application.
        path: /healthz
        # Port name (matches the container port named "http"). Usually no change needed.
        port: http
      # Seconds to wait before the first probe after container start.
      initialDelaySeconds: 10
      # Interval between readiness checks.
      periodSeconds: 10
    # Liveness probe
    livenessProbe:
      httpGet:
        # Health check endpoint implemented by your application.
        path: /healthz
        # Port name (matches the container port named "http"). Usually no change needed.
        port: http
      # Seconds to wait before the first probe after container start.
      initialDelaySeconds: 15
      # Interval between liveness checks.
      periodSeconds: 20



# -----------------  Advanced configuration (defaults are suitable for most cases)  ---

# Pod update strategy. Options: RollingUpdate | Recreate
# RollingUpdate: gradually replaces old pods with new ones (zero-downtime default).
# Recreate:      kills all old pods before starting new ones (causes downtime).
strategy: RollingUpdate

# Service discovery configuration.
# Pods inside the cluster use dynamic private IPs; use the Service DNS name instead.
# Access pattern inside the cluster: http://<appName>
service:
  # Service type: ClusterIP (internal only) | NodePort (exposes a host port, dev only)
  # NodePort opens a fixed port on every cluster node. Avoid in production.
  type: ClusterIP
  # Service port. Do not change unless your app listens on a non-standard port.
  port: 80
  # NodePort value (30000-32767). Must be cluster-unique across all namespaces.
  # Enable temporarily for debugging; disable afterwards.
  #nodeport: 31100
  ## Extra Service ports for multi-port or sidecar pods.
  # extraPorts:
  # - name: metricPort
  #   port: 8888
  #   protocol: TCP
  #   targetPort: 8888

# Image pull secrets for private registries. Leave empty for public images.
imagePullSecrets: []

# RBAC configuration. Defaults are sufficient for most workloads.
rbac:
  # Create Role and RoleBinding for the pod's ServiceAccount.
  create: true
  akka_create: true

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod-level security context. Leave empty unless you need fsGroup or runAsGroup.
podSecurityContext: {}
  # fsGroup: 2000

# Container-level security context.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Horizontal Pod Autoscaler. Requires the application to be stateless and
# support multiple replicas. Scaling triggers are based on the resource requests above.
# Example: CPU request=100m → scale out when average CPU reaches 80m.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Tolerations allow pods to be scheduled onto nodes with matching taints.
tolerations: []

# Affinity rules. The default is soft pod anti-affinity, which spreads replicas
# across nodes when running multiple instances.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - app-base
        topologyKey: "kubernetes.io/hostname"

# Additional /etc/hosts entries injected into the pod.
hostAliases: []
  # - ip: "127.0.0.1"
  #   hostnames:
  #   - "myapp.local"

# Arbitrary extra Kubernetes manifests rendered alongside the chart resources.
# Supports any resource kind recognized by the target cluster.
extraManifests: []
# extraManifests:
#   - apiVersion: monitoring.coreos.com/v1
#     kind: ServiceMonitor
#     metadata:
#       labels:
#         project-space: "{{- .Release.Namespace -}}"
#       name: my-app
