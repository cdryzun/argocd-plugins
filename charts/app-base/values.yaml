#       namespaceSelector:
#         matchNames:
#           - "{{ .Release.Namespace }}"
#       selector:
#         matchLabels:
#           app.kubernetes.io/name: my-app

# Init containers run to completion before the main container starts.
# Use for pre-flight tasks or dependency synchronization.
initContainers: []
  # - name: init
  #   image: busybox:1.31.1
  #   command:
  #     - sh
  #     - '-c'
  #     - ls / && chmod -Rv 600 /tmp/* || true

# Sidecar containers that run alongside the main container in the same pod.
sideCars: ""
