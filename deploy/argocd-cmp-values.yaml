repoServer:
  extraContainers:
    - name: basecharter
      # Replace YOUR_GITHUB_ORG with your GitHub organization or username.
      # Image is automatically published to ghcr.io via GitHub Actions on every push to main.
      image: ghcr.io/YOUR_GITHUB_ORG/basecharter:latest
      command: [/var/run/argocd/argocd-cmp-server]
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: var-files
          mountPath: /var/run/argocd
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        - name: tmp
          mountPath: /tmp
