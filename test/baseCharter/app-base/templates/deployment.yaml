apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-base.fullname" . }}
  labels:
{{ template "app-base.labels" merge (dict "extraLabels" .Values.podLabels) .  }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
{{- if eq .Values.strategy "Recreate" }}
  strategy:
    type: Recreate
{{- end }}
{{- if eq .Values.strategy "RollingUpdate" }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
{{- end }}
  selector:
    matchLabels:
      {{- include "app-base.selectorLabels" . | nindent 6 }}
  template:
    metadata:
    {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      labels:
        {{- include "app-base.selectorLabels" . | nindent 8 }}
        {{- with .Values.logExtraLable }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "app-base.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
{{- if .Values.initContainers }}
      initContainers:
{{ toYaml .Values.initContainers | indent 8 }}
{{- end }}
      containers:
        - name: {{ include "app-base.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          {{- if not .Values.containerProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 10
            failureThreshold: 3
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: {{ .Values.containerPort }}
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 18
          livenessProbe:
            tcpSocket:
              port: {{ .Values.containerPort }}
            initialDelaySeconds: 15
            failureThreshold: 3
            periodSeconds: 20
          {{- else }}
          {{- toYaml .Values.containerProbe.httpMethod | nindent 10 }}
          {{- end }}
          env:
            {{- toYaml .Values.envVars | nindent 12 }}
            {{- range $env_name, $secret_name := .Values.secretVars}}
            - name: {{ $env_name }}
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: {{ $secret_name }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}     
          volumeMounts:
          {{- if .Values.configMount.configList }}
          {{- with .Values.configMount }}
          {{- range $key, $value :=  .configList }}
          {{- $subpath := (splitList "/" $value) }}
            - name: {{ $key | replace "." "-" }}
              mountPath: {{ $value }}
              subPath:  {{ last $subpath }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          {{- if .Values.mountExtraPersistenceVolume }}
          {{- range .Values.mountExtraPersistenceVolume }}
          {{- $item := . }}
            - name: {{ $item.pvcName }}
              mountPath: {{ $item.mountPath }}
              readOnly: {{ $item.readOnly }}
          {{- end }}
          {{- end }}
        {{- if .Values.sideCars }}
          {{- toYaml .Values.sideCars | nindent 8 }}
        {{- end }}
      volumes:
        {{- if .Values.configMount.configList }}
        {{- with .Values.configMount }}
        {{- range $key, $value :=  .configList }}
        - name: {{ $key | replace "." "-" }}
          configMap:
            name: {{ $key | replace "." "-" }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "app-base.fullname" . }}-data
        {{- end }}
        {{- if .Values.mountExtraPersistenceVolume }}
        {{- range .Values.mountExtraPersistenceVolume }}
        {{- $item := . }}
        - name: {{ $item.pvcName }}
          persistentVolumeClaim:
            claimName: {{ $item.pvcName }}
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostAliases }}
      hostAliases:
{{ toYaml .Values.hostAliases | indent 8 }}
      {{- end }}
