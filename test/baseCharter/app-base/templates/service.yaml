apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-base.fullname" . }}
  annotations:
{{ .Values.serviceAnnotations | toYaml | indent 4 }}
  labels:
{{ template "app-base.labels" merge (dict "extraLabels" .Values.serviceLabels) .  }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
      name: http
      {{- if eq .Values.service.type "NodePort"  }}
      {{- if .Values.service.nodeport }}
      nodePort: {{ .Values.service.nodeport }}
      {{- end }}
      {{- end }}
    {{- if .Values.service.extraPorts }}
    {{- include "app-base.tplValue" (dict "value" .Values.service.extraPorts "context" $) | nindent 4 }}
    {{- end }}
  selector:
    {{- include "app-base.selectorLabels" . | nindent 4 }}
