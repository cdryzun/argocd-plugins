{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "app-base.serviceAccountName" . }}
  labels:
{{ template "app-base.labels" merge (dict "extraLabels" .Values.serviceAccountLabels) .  }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
